name: 🧪 Android tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-android:
    name: Test Godot ${{ matrix.godot-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        godot-version:
          - 4.5.1-stable
          - 4.6.3-stable
          - 4.7.1-stable
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false # don't initialize submodules automatically

      - name: Prepare testing
        uses: ./.github/actions/prepare-testing
        timeout-minutes: 15
        with:
          arch: x86_64
          godot-version: ${{ matrix.godot-version }}
          export-platform: "android"

      # Needed for Android emulator
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Make sure that the required directories and .cfg do exists. Workaround to keep ADV happy on `ubuntu-latest`.
      - name: Setup Android directories
        run: |
          mkdir -p $HOME/.android
          mkdir -p $HOME/.android/avd
          touch $HOME/.android/repositories.cfg

      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@0a638108440efd5c7f980e6ba145dbcdd8f32009 # v2.37.0
        timeout-minutes: 30
        with:
          api-level: 34
          target: "google_apis"
          channel: "stable"
          force-avd-creation: true
          disable-animations: true
          disable-spellchecker: true
          emulator-options: >
            -no-window
            -no-snapshot-save
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -camera-front none
          arch: x86_64
          script: ./scripts/run-android-tests.sh
