name: 🧪 .NET tests

on:
  workflow_call:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Verify tries to launch a GUI diff tool on failure; headless runners need it off.
  DiffEngine_Disabled: true

jobs:
  sourcegen-tests:
    name: Source generator tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Run tests
        working-directory: tests/dotnet/Sentry.Godot.SourceGenerators.Tests
        run: dotnet test --nologo

      - name: Print snapshot diff on failure
        if: failure()
        working-directory: tests/dotnet/Sentry.Godot.SourceGenerators.Tests
        run: |
          shopt -s nullglob
          for received in *.received.txt; do
            verified="${received%.received.txt}.verified.txt"
            if [ ! -f "$verified" ]; then
              continue
            fi
            echo "::group::Unified diff — $verified vs $received"
            diff -u "$verified" "$received" || true
            echo "::endgroup::"
            {
              echo "## Generated SentrySdk forwarders drifted"
              echo ''
              echo "The source generator produced output that no longer matches the committed baseline \`$verified\`."
              echo "This usually means the upstream \`Sentry\` NuGet package changed its public API surface, or the generator itself was modified."
              echo ''
              echo "### Review and accept"
              echo ''
              echo "1. Inspect the diff below; confirm the change is intentional."
              echo "2. Check out the branch locally and run the promote helper, which regenerates the snapshot, moves it over the verified baseline, and re-runs the tests to confirm:"
              echo ''
              echo '   ```sh'
              echo "   pwsh scripts/accept-dotnet-snapshots.ps1"
              echo '   ```'
              echo ''
              echo "3. Commit the updated \`$verified\` alongside the change that caused the drift."
              echo ''
              echo "The raw \`$received\` is also attached to this run as the \`snapshot-diffs\` artifact."
              echo ''
              echo "### Diff"
              echo ''
              echo '```diff'
              diff -u "$verified" "$received" || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=tests/dotnet/Sentry.Godot.SourceGenerators.Tests/$verified::Generated SentrySdk forwarders drifted. Review the diff in the Job Summary; if intentional, run scripts/accept-dotnet-snapshots.ps1 and commit the updated $verified."
          done

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: snapshot-diffs
          path: tests/dotnet/Sentry.Godot.SourceGenerators.Tests/*.received.txt
          if-no-files-found: ignore
          retention-days: 14

  demo-compile:
    name: Demo project compiles
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Build demo project
        run: dotnet build "project/Sentry demo project.csproj" --nologo
