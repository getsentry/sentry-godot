name: 🧪 C++ tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cpp-tests:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false

      - name: Checkout required submodules
        shell: bash
        run: |
          git submodule update --init --recursive --depth 1 \
            modules/godot-cpp \
            modules/sentry-native \
            modules/gdUnit4 \
            modules/doctest

      - name: Install Linux build deps
        run: |
          sudo apt update
          sudo apt install libcurl4-openssl-dev

      - name: Install SCons
        run: python -m pip install scons

      - name: Build GDExtension with tests
        run: scons tests=yes target=editor

      - name: Set up Godot
        run: ./scripts/setup-godot.sh

      - name: Run tests
        shell: bash
        timeout-minutes: 2
        run: |
          "${GODOT}" --headless --path project/ --editor --test-sentry
