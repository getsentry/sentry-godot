name: Prepare testing
description: Set up environment for testing purposes.

inputs:
  arch:
    description: Architecture to use for testing.
    required: true
  export-platform:
    description: Which export template will be used, lowercase (e.g., android, ios).
    required: false
    default: ""
  dotnet:
    description: Set to "true" to use the Godot .NET (mono) build and build the C# project.
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout required submodules
      shell: bash
      run: |
        git submodule update --init --depth 1 modules/app-runner
        git submodule update --init --depth 1 modules/gdUnit4
        git submodule update --init --depth 1 modules/godot-cpp
        git submodule update --init --depth 1 project/test/util/json_assert

    - name: Download artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
      with:
        name: sentry-godot-gdextension
        path: project/

    - name: Install SCons
      shell: bash
      run: |
        python -m pip install scons
        python --version
        scons --version

    - name: Set up Java 17
      if: inputs.export-platform == 'android'
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: temurin
        java-version: 17

    - name: Install Linux dependencies (32-bit)
      if: runner.os == 'Linux' && inputs.arch == 'x86_32'
      shell: bash
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install \
            libatomic1:i386 \
            libudev1:i386 \
            libfontconfig1:i386 \
            libcurl4-openssl-dev:i386 \
            zlib1g:i386

    - name: Set up Godot
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
        MONO_FLAG: ${{ inputs.dotnet == 'true' && '--mono' || '' }}
      run: ./scripts/setup-godot.sh --arch "$ARCH" $MONO_FLAG

    - name: Set up .NET
      if: inputs.dotnet == 'true'
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 8.0.x

    - name: Diagnostic info
      shell: bash
      run: |
        ls -lR project/

    - name: Prepare gdUnit4
      shell: bash
      run: |
        scons project/addons/gdUnit4

    - name: Prepare export configuration
      shell: bash
      run: cp exports/export_presets.cfg project/export_presets.cfg

    - name: Download export templates
      if: inputs.export-platform != ''
      shell: bash
      env:
        DOTNET: ${{ inputs.dotnet }}
      run: |
        if [ "$DOTNET" = "true" ]; then
            archive_file=Godot_v${GODOT_VERSION}_mono_export_templates.tpz
        else
            archive_file=Godot_v${GODOT_VERSION}_export_templates.tpz
        fi
        url=https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/${archive_file}
        echo "Downloading templates from: $url"
        curl -L -o templates.zip "${url}"

        echo "Extracting export templates..."
        mkdir -p exports/templates
        unzip -j templates.zip -d exports/templates
        rm templates.zip

    - name: Prepare project
      shell: bash
      run: |
        find project/addons/sentry/bin/ -name "crashpad_handler" -exec chmod 755 "{}" \;
        echo "--- Rebuilding import cache"
        ${GODOT} --headless --path project/ --import --verbose
        echo "--- Finished rebuilding import cache"
